<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="620" viewBox="0 0 1320 620">
  <rect width="1320" height="620" fill="#2D3142"/>
  <rect x="0" y="0" width="1320" height="10" fill="#C9963A"/>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#C9963A" x="80" y="98" letter-spacing="4" opacity="0.85">A MESSAGE FROM YOU</text>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#FAF9F6" x="80" y="190" letter-spacing="-2">Write a letter.</text>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#FAF9F6" x="80" y="280">They'll read it</text>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#C9963A" x="80" y="370">when it matters most.</text>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#FAF9F6" opacity="0.48" x="80" y="428">Personal messages, delivered with your documents.</text>
  <!-- Letter illustration -->
  <rect x="780" y="60" width="460" height="500" rx="30" fill="#FAF9F6" opacity="0.04"/>
  <rect x="820" y="130" width="380" height="340" rx="14" fill="#FAF9F6" opacity="0.06"/>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#FAF9F6" opacity="0.32" x="856" y="186">To my family,</text>
  <line x1="856" y1="218" x2="1160" y2="218" stroke="#FAF9F6" stroke-width="2.5" opacity="0.22" stroke-linecap="round"/>
  <line x1="856" y1="256" x2="1120" y2="256" stroke="#FAF9F6" stroke-width="2.5" opacity="0.17" stroke-linecap="round"/>
  <line x1="856" y1="294" x2="1160" y2="294" stroke="#FAF9F6" stroke-width="2.5" opacity="0.13" stroke-linecap="round"/>
  <line x1="856" y1="332" x2="1080" y2="332" stroke="#FAF9F6" stroke-width="2.5" opacity="0.1" stroke-linecap="round"/>
  <line x1="856" y1="370" x2="1140" y2="370" stroke="#FAF9F6" stroke-width="2.5" opacity="0.09" stroke-linecap="round"/>
  <line x1="856" y1="408" x2="1000" y2="408" stroke="#FAF9F6" stroke-width="2.5" opacity="0.08" stroke-linecap="round"/>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#C9963A" opacity="0.58" x="1010" y="454" text-anchor="middle">Delivered after you're gone</text>
</svg>
